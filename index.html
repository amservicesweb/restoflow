    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background: radial-gradient(circle at 20% 30%, #0f0f0f, #050505);
        color: #f5efe6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text", system-ui, sans-serif;
        max-width: 500px;
        margin: 0 auto;
        min-height: 100vh;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 70% 80%, rgba(201, 168, 76, 0.08), transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      :root {
        --gold: #d4af37;
        --gold-light: #f5e6a3;
        --gold-dark: #b8960c;
        --dark: #0a0a0a;
        --surface: rgba(26, 26, 30, 0.7);
        --surface2: rgba(36, 36, 40, 0.8);
        --border: rgba(255, 255, 255, 0.1);
        --text: #f5efe6;
        --text-secondary: #a0a0b0;
        --green: #2ecc71;
        --green-dark: #27ae60;
        --red: #e74c3c;
        --pink: #e84393;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --shadow-gold: 0 0 20px rgba(212, 175, 55, 0.3);
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      input,
      button,
      select,
      textarea {
        font-family: inherit;
        outline: none;
      }

      button {
        cursor: pointer;
        transition: var(--transition);
      }

      button:active {
        transform: scale(0.96);
      }

      @media (max-width: 480px) {
        .content {
          padding: 12px;
          padding-bottom: 80px;
        }
        .card {
          padding: 14px;
        }
        .date-range {
          flex-direction: column;
          gap: 10px;
        }
        .date-item {
          width: 100%;
          flex: none;
        }
        .date-item .inp {
          width: 100%;
          box-sizing: border-box;
          font-size: 14px;
        }
        .equal-row {
          flex-direction: row;
          gap: 10px;
        }
        .equal-item {
          flex: 1;
          min-width: 0;
        }
        .equal-item .inp {
          width: 100%;
          box-sizing: border-box;
          font-size: 13px;
          padding-left: 10px;
          padding-right: 10px;
        }
        .table-buttons {
          gap: 8px;
        }
        .table-btn {
          padding: 8px 14px;
          font-size: 12px;
        }
        .cat-btn {
          padding: 6px 12px;
          font-size: 11px;
        }
        .toggle-btn {
          padding: 8px;
          font-size: 11px;
        }
        .hdr {
          padding: 10px 12px;
        }
        .nav-btn {
          padding: 8px 2px;
          font-size: 9px;
        }
        .nav-btn .nav-icon {
          font-size: 18px;
        }
      }

      .hdr {
        background: rgba(10, 10, 12, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 14px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        padding-top: max(14px, env(safe-area-inset-top));
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--gold-dark), var(--gold));
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-gold);
      }

      .logo-text {
        font-size: 14px;
        font-weight: 800;
        color: var(--gold);
        letter-spacing: 2px;
      }

      .logo-sub {
        font-size: 9px;
        color: var(--text-secondary);
        letter-spacing: 2px;
      }

      .hdr-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .waiter-badge {
        font-size: 11px;
        color: var(--text-secondary);
        background: rgba(255, 255, 255, 0.08);
        padding: 6px 12px;
        border-radius: 40px;
        font-weight: 500;
      }

      .lang-btn,
      .icon-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        border-radius: 40px;
        padding: 6px 14px;
        font-size: 12px;
      }

      .icon-btn {
        color: var(--red);
      }

      .nav {
        display: flex;
        background: rgba(10, 10, 12, 0.9);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--border);
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 500px;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom);
      }

      .nav-btn {
        flex: 1;
        padding: 12px 6px;
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 11px;
        border-top: 2px solid transparent;
        font-weight: 500;
      }

      .nav-btn.active {
        color: var(--gold);
        border-top-color: var(--gold);
      }

      .nav-btn .nav-icon {
        font-size: 22px;
        display: block;
        margin-bottom: 4px;
      }

      .content {
        padding: 20px 16px;
        padding-bottom: 85px;
        position: relative;
        z-index: 1;
      }

      .card {
        background: var(--surface);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: var(--shadow);
      }

      .btn {
        border: none;
        border-radius: 40px;
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 600;
        width: 100%;
        display: block;
        text-align: center;
        margin-bottom: 10px;
      }

      .btn-gold {
        background: linear-gradient(135deg, var(--gold-dark), var(--gold));
        color: #0a0a0a;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      }

      .btn-pink {
        background: linear-gradient(135deg, #c0395a, var(--pink));
        color: #fff;
      }

      .btn-green {
        background: linear-gradient(135deg, var(--green-dark), var(--green));
        color: #fff;
      }

      .btn-outline {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .btn-outline-red {
        background: rgba(231, 76, 60, 0.15);
        border: 1px solid var(--red);
        color: var(--red);
      }

      .btn-outline-gold {
        background: rgba(212, 175, 55, 0.1);
        border: 1px solid var(--gold);
        color: var(--gold);
      }

      .btn-sm {
        padding: 10px 16px;
        font-size: 12px;
        border-radius: 30px;
        width: auto;
        flex: 1;
      }

      .inp {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 15px;
        color: var(--text);
        width: 100%;
      }

      .inp:focus {
        border-color: var(--gold);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
      }

      .lbl {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        display: block;
        font-weight: 500;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      .toggle {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }

      .toggle-btn {
        flex: 1;
        padding: 12px;
        border-radius: 40px;
        border: none;
        font-size: 13px;
        font-weight: 600;
      }

      .toggle-btn.active {
        background: var(--gold);
        color: #0a0a0a;
        box-shadow: var(--shadow-gold);
      }

      .toggle-btn:not(.active) {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
      }

      .badge {
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 40px;
        font-weight: 600;
      }

      .badge-occupied {
        background: rgba(212, 175, 55, 0.2);
        color: var(--gold);
      }

      .badge-reserved {
        background: rgba(232, 67, 147, 0.2);
        color: var(--pink);
      }

      .badge-free {
        background: rgba(46, 204, 113, 0.2);
        color: var(--green);
      }

      .login-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 20px;
        background: radial-gradient(circle at 30% 20%, #1a1a2e, #0a0a0a);
      }

      .pin-dots {
        display: flex;
        gap: 16px;
        margin-bottom: 40px;
      }

      .pin-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--border);
      }

      .pin-dot.filled {
        background: var(--gold);
        box-shadow: 0 0 8px var(--gold);
      }

      .pin-dot.error {
        background: var(--red);
      }

      .pin-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        width: 280px;
      }

      .pin-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 60px;
        width: 80px;
        height: 80px;
        font-size: 28px;
        font-weight: 600;
        color: var(--text);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .pin-btn.del {
        background: rgba(231, 76, 60, 0.15);
        font-size: 24px;
        color: var(--red);
      }

      .floor-container {
        background: linear-gradient(135deg, #111115, #0a0a0e);
        border-radius: 28px;
        padding: 16px;
        border: 1px solid var(--border);
        overflow-x: auto;
      }

      #floor-svg {
        width: 100%;
        max-width: 380px;
        display: block;
        margin: 0 auto;
      }

      .metric {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 16px;
        flex: 1;
        text-align: center;
      }

      .metric-label {
        font-size: 11px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .metric-val {
        font-size: 26px;
        font-weight: 800;
      }

      .search-wrap {
        position: relative;
        flex: 1;
      }

      .search-wrap .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 16px;
        color: var(--text-secondary);
      }

      .search-wrap .inp {
        padding-left: 48px;
      }

      .toast {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(20px);
        color: var(--gold);
        padding: 14px 28px;
        border-radius: 60px;
        font-size: 13px;
        z-index: 999;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        white-space: nowrap;
        border: 1px solid var(--gold);
        box-shadow: var(--shadow-gold);
      }

      .toast.show {
        opacity: 1;
      }

      .cat-scroll {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0 12px 0;
        margin-bottom: 16px;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }

      .cat-scroll::-webkit-scrollbar {
        display: none;
      }

      .cat-btn {
        flex-shrink: 0;
        padding: 8px 14px;
        border-radius: 40px;
        border: 1.5px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.08);
        color: var(--text);
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
      }

      .cat-btn.active {
        background: var(--gold);
        color: #0a0a0a;
        border-color: var(--gold);
      }

      .qty-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .qty-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--border);
        border-radius: 40px;
        width: 36px;
        height: 36px;
        font-size: 20px;
        color: var(--gold);
      }

      .qty-value {
        font-size: 16px;
        font-weight: 600;
        min-width: 36px;
        text-align: center;
      }

      .date-range {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .date-item {
        flex: 1;
        min-width: 0;
        max-width: 100%;
      }

      .equal-row {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .equal-item {
        flex: 1;
        min-width: 0;
        max-width: 100%;
      }

      .equal-item .inp {
        width: 100%;
        min-width: 0;
        font-size: 14px;
        box-sizing: border-box;
      }

      .table-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
      }

      .table-btn {
        padding: 12px 20px;
        border-radius: 40px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
      }

      .table-btn.active {
        border-color: var(--pink);
        background: rgba(232, 67, 147, 0.2);
        color: var(--pink);
      }

      .stats-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .stats-table th,
      .stats-table td {
        padding: 10px 8px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .stats-table th {
        color: var(--gold);
      }

      .confirm-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .confirm-dialog {
        background: var(--surface);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 28px;
        width: 300px;
        text-align: center;
        border: 1px solid var(--border);
      }

      .confirm-dialog p {
        margin-bottom: 24px;
        font-size: 16px;
      }

      .confirm-buttons {
        display: flex;
        gap: 14px;
      }

      .confirm-buttons button {
        flex: 1;
        padding: 12px;
        border-radius: 40px;
        border: none;
        font-weight: 600;
      }

      .confirm-yes {
        background: var(--red);
        color: white;
      }

      .confirm-no {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      .receipt {
        background: #fff;
        color: #000;
        border-radius: 24px;
        padding: 24px;
        font-family: monospace;
        max-width: 340px;
        margin: 0 auto 20px;
        box-shadow: var(--shadow);
      }

      .receipt-header {
        text-align: center;
        margin-bottom: 12px;
      }

      .receipt-title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 2px;
      }

      .receipt-address {
        font-size: 9px;
        color: #555;
        margin-top: 4px;
      }

      .receipt-phone {
        font-size: 10px;
        color: #777;
        margin-top: 2px;
      }

      .receipt-sub {
        font-size: 10px;
        color: #555;
        letter-spacing: 2px;
        text-align: center;
      }

      .receipt-divider {
        border-top: 1px dashed #ccc;
        margin: 10px 0;
      }

      .receipt-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 3px;
      }

      .receipt-total {
        display: flex;
        justify-content: space-between;
        font-weight: 800;
        font-size: 16px;
        margin-top: 8px;
      }

      .bron-counters {
        display: flex;
        gap: 12px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
        margin-top: 16px;
      }

      .bron-counter {
        flex: 1;
        text-align: center;
      }

      .bron-counter-label {
        font-size: 11px;
        color: var(--text-secondary);
      }

      .bron-counter-val {
        font-size: 22px;
        font-weight: 700;
      }

      .disc-btn {
        padding: 10px 18px;
        border-radius: 40px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
        font-size: 14px;
      }

      .disc-btn.active {
        border-color: var(--gold);
        background: rgba(212, 175, 55, 0.2);
        color: var(--gold);
      }

      .pay-btn {
        flex: 1;
        padding: 14px;
        border-radius: 40px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
      }

      .pay-btn.active {
        border-color: var(--gold);
        background: rgba(212, 175, 55, 0.2);
        color: var(--gold);
      }

      .change-box {
        display: flex;
        justify-content: space-between;
        background: rgba(46, 204, 113, 0.1);
        border-radius: 16px;
        padding: 14px 18px;
        margin-top: 12px;
      }

      .restoflow {
        position: fixed;
        bottom: 16px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 9px;
        color: #333;
        letter-spacing: 1px;
        pointer-events: none;
        z-index: 200;
      }

      .restoflow span {
        color: var(--gold);
      }

      .loader {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--text-secondary);
        font-size: 14px;
      }

        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card,
      .floor-container,
      .metric {
        animation: fadeInUp 0.4s ease;
      }
    </style>
  </head>

      function nowMoscow() {
        const now = new Date();
        const moscow = new Date(now.getTime() + 3 * 60 * 60 * 1000);
        return moscow.toISOString().replace('Z', '+03:00');
      }

      function formatDateRussian(dateStr) {
        if (!dateStr) return '';
        const [year, month, day] = dateStr.split('-');
        return `${day}.${month}.${year}`;
      }

      function formatPhoneRussian(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.startsWith('8')) v = '7' + v.slice(1);
        if (!v.startsWith('7')) v = '7' + v;
        v = v.slice(0, 11);
        let f = '+7';
        if (v.length > 1) f += ' ' + v.slice(1, 4);
        if (v.length > 4) f += ' ' + v.slice(4, 7);
        if (v.length > 7) f += ' ' + v.slice(7, 9);
        if (v.length > 9) f += ' ' + v.slice(9, 11);
        input.value = f;
        return f;
      }

      function isWorkingHours(timeStr) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const totalMinutes = hours * 60 + minutes;
        return totalMinutes >= 720 || totalMinutes <= 180;
      }

          .eq('arrival_date', date)

        return existingBrons && existingBrons.length > 0;

      async function dbUpdateOrderQty(orderId, newQty, tableId) {
        if (newQty <= 0) {
          await dbRemoveOrder(orderId, tableId);
        } else {
          await sb.from('orders').update({qty:newQty}).eq('id',orderId);
          await loadTables();
        }
      }

      async function dbRemoveOrder(orderId, tableId) {
        await sb.from('orders').delete().eq('id',orderId);
        const t = tables.find(t=>t.id===tableId);
        const remaining = (t.orders||[]).filter(o=>o.id!==orderId);
        if(remaining.length===0){

      async function dbSaveBron(tableId, form) {
        // Bloquer si la table a déjà une résa active pour cette date (peu importe l'heure)
        const {data: existing} = await sb.from('brons')
          .select('*')
          .eq('table_id', tableId)
          .eq('status', 'active')
          .eq('arrival_date', form.date);
        if (existing && existing.length > 0) {
          const t = existing[0].arrival_time || '';
          throw new Error('Double booking:' + t);
        }

        await sb.from('brons').insert({
          table_id:tableId,
          guest_name:form.name,
          guest_phone:form.phone,
          guests_count:parseInt(form.guests)||1,
          arrival_date:form.date,
          arrival_time:form.time,
          note:form.note,
          status:'active',
          created_by: waiter.id
        });
        await sb.from('tables').update({status:'reserved'}).eq('id',tableId);

        await loadTables();
      }

      async function dbOpenTable(tableId) {
        await sb.from('brons').update({status:'opened'}).eq('table_id',tableId).eq('status','active');
        await sb.from('tables').update({status:'occupied', waiter_id:waiter.id}).eq('id',tableId);
        await loadTables();
      }

      async function dbCancelBron(bronId, tableId) {
        await sb.from('brons').update({status:'cancelled'}).eq('id',bronId);
        const t = tables.find(t=>t.id===tableId);
        const remaining = (t.brons||[]).filter(b=>b.id!==bronId && b.status === 'active');
        if(remaining.length===0){
          await sb.from('tables').update({status:'free'}).eq('id',tableId);
        }
        await loadTables();
      }

      // ===== EXPORT EXCEL =====
      async function exportToExcel() {
        const { data: payments } = await sb.from('payments').select('*');

        if (!payments || payments.length === 0) {
          toast('Aucune donnée à exporter');
          return;
        }

        const allOrders = payments.map(p => ({
          heure: new Date(p.paid_at).toLocaleTimeString(),
          table: p.table_id,
          serveur: p.waiter_id,
          produit: '',
          categorie: '',
          quantite: 1,
          prix_unitaire: p.total_final,
          total: p.total_final,
          mode_paiement: p.payment_method === 'cash' ? (lang === 'ru' ? 'Наличные' : 'Cash') : (lang === 'ru' ? 'Карта' : 'Card'),
          remise: p.discount || 0,
          commentaire: ''
        }));

        const totalRevenue = allOrders.reduce((s, o) => s + o.total, 0);
        const totalCash = allOrders.filter(o => o.mode_paiement === (lang === 'ru' ? 'Наличные' : 'Cash')).reduce((s, o) => s + o.total, 0);
        const totalCard = allOrders.filter(o => o.mode_paiement === (lang === 'ru' ? 'Карта' : 'Card')).reduce((s, o) => s + o.total, 0);
        const totalTransfer = allOrders.filter(o => o.mode_paiement === (lang === 'ru' ? 'Перевод' : 'Transfer')).reduce((s, o) => s + o.total, 0);
        const totalOrdersCount = allOrders.length;
        const avgTicket = totalRevenue / totalOrdersCount || 0;

        const shishaTotal = allOrders.filter(o => o.categorie === (lang === 'ru' ? 'Кальян' : 'Shisha')).reduce((s, o) => s + o.total, 0);
        const drinksTotal = allOrders.filter(o => o.categorie === (lang === 'ru' ? 'Напиток' : 'Drink')).reduce((s, o) => s + o.total, 0);
        const foodTotal = allOrders.filter(o => o.categorie === (lang === 'ru' ? 'Закуска' : 'Snack')).reduce((s, o) => s + o.total, 0);

        const wb = XLSX.utils.book_new();

        const wsData = [
          [`SUPERNOVA LOUNGE BAR - ${T('period')}: ${formatDateRussian(analyticsFrom)} - ${formatDateRussian(analyticsTo)}`],
          [],
          [T('hour'), T('table'), T('waiter'), T('product'), T('category'), T('quantity'), T('unitPrice'), T('total'), T('paymentMethod'), T('discount'), T('comment')]
        ];

        for (const order of allOrders) {
          wsData.push([
            order.heure, order.table, order.serveur, order.produit, order.categorie,
            order.quantite, order.prix_unitaire, order.total, order.mode_paiement,
            order.remise, order.commentaire
          ]);
        }

        const ws1 = XLSX.utils.aoa_to_sheet(wsData);
        ws1['!cols'] = [{wch:8},{wch:8},{wch:14},{wch:28},{wch:12},{wch:8},{wch:12},{wch:12},{wch:14},{wch:10},{wch:16}];
        XLSX.utils.book_append_sheet(wb, ws1, lang === 'ru' ? 'Детали' : 'Details');

        const ws2Data = [
          ['📊 DASHBOARD'],
          [],
          [T('totalRevenue'), fmtRub(totalRevenue)],
          [T('cashTotal'), fmtRub(totalCash)],
          [T('cardTotal'), fmtRub(totalCard)],
          [T('transferTotal'), fmtRub(totalTransfer)],
          [T('totalOrders'), totalOrdersCount],
          [T('avgTicket'), fmtRub(avgTicket)],
          [],
          ['📈 ' + T('categoryAnalysis')],
          [T('categoryShisha'), fmtRub(shishaTotal), `${Math.round(shishaTotal/totalRevenue*100)}%`],
          [T('categoryDrinks'), fmtRub(drinksTotal), `${Math.round(drinksTotal/totalRevenue*100)}%`],
          [T('categoryFood'), fmtRub(foodTotal), `${Math.round(foodTotal/totalRevenue*100)}%`]
        ];
        const ws2 = XLSX.utils.aoa_to_sheet(ws2Data);
        ws2['!cols'] = [{wch:28},{wch:16},{wch:10}];
        XLSX.utils.book_append_sheet(wb, ws2, 'Dashboard');

        const byWaiter = {};
        for (const order of allOrders) {
          byWaiter[order.serveur] = (byWaiter[order.serveur] || 0) + order.total;
        }
        const ws3Data = [
          ['👥 ' + T('salesByWaiter')],
          [],
          [T('waiter'), T('revenue'), T('bonus')]
        ];
        for (const [name, sales] of Object.entries(byWaiter)) {
          ws3Data.push([name, fmtRub(sales), fmtRub(sales * 0.025)]);
        }
        const ws3 = XLSX.utils.aoa_to_sheet(ws3Data);
        XLSX.utils.book_append_sheet(wb, ws3, lang === 'ru' ? 'Serveurs' : 'Waiters');

        XLSX.writeFile(wb, `supernova_report_${analyticsFrom}_${analyticsTo}.xlsx`);
        toast(lang==='ru'?'✅ Excel exporté avec succès':'✅ Excel exported successfully');
      }

      let _pinVal = '';
      function pinPress(d) {
        if(d==='del'){ _pinVal=_pinVal.slice(0,-1); updateDots(); return; }
        _pinVal += d; updateDots();
        if(_pinVal.length===4) doLogin();
      }

      function updateDots(err=false) {
        for(let i=0;i<4;i++){
          const dot=$('dot'+i);
          if(!dot) return;
          dot.classList.toggle('filled',i<_pinVal.length && !err);
          dot.classList.toggle('error',i<_pinVal.length && err);
        }
      }

      async function doLogin() {
        const ok = await tryLogin(_pinVal);
        if(ok){
          screen='main';
          document.body.style.overflow = 'auto';
          await loadTables();
          subscribeRealtime();
        } else {
          updateDots(true);
          setTimeout(()=>{ _pinVal=''; updateDots(); },700);
        }
      }

      function renderFloorPlan3D() {
        const W=364, H=380;

        const sofaVertical=(x,y,w,h,col)=>{
          const ch=Math.floor(h/3);
          const cushions=[1,2].map(i=>`<line x1="${x+2}" y1="${y+ch*i}" x2="${x+w-2}" y2="${y+ch*i}" stroke="${col}" stroke-width="1" opacity="0.5"/>`).join('');
          return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="0.15" stroke="${col}" stroke-width="0.8" stroke-opacity="0.5"/>${cushions}`;
        };
        const sofaHorizontal=(x,y,w,h,col)=>{
          const cw=Math.floor(w/3);
          const cushions=[1,2].map(i=>`<line x1="${x+cw*i}" y1="${y+2}" x2="${x+cw*i}" y2="${y+h-2}" stroke="${col}" stroke-width="1" opacity="0.5"/>`).join('');
          return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="0.15" stroke="${col}" stroke-width="0.8" stroke-opacity="0.5"/>${cushions}`;
        };
        const chair=(x,y,w,h,col)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="0.18" stroke="${col}" stroke-width="0.8" stroke-opacity="0.6"/>`;

        const TW=78, TH=30, SF=8;
        const lx=18, rx=210;

        const tcs=[
          {id:7, x:lx+20, y:32,  w:36, h:70, shape:'vertical'},
          {id:6, x:lx+18, y:130, w:36, h:36, shape:'round'},
          {id:5, x:lx, y:200, w:TW, h:TH, shape:'rect'},
          {id:4, x:lx, y:270, w:TW, h:TH, shape:'rect'},
          {id:1, x:rx, y:60,  w:TW+22, h:TH, shape:'rect'},
          {id:2, x:rx, y:150, w:TW+22, h:TH, shape:'rect'},
          {id:3, x:rx, y:240, w:TW+22, h:TH, shape:'rounded'},
        ];

        const shapes=tcs.map(tc=>{
          const t=tables.find(t=>t.id===tc.id)||{status:'free',orders:[],discount:0};
          const col=statusColor(t.status);
          const tot=t.status==='occupied'?tableTotal(t,true):0;

          let sofasSVG='';
          if(tc.shape==='round'){
            sofasSVG=chair(tc.x-12,tc.y+8,10,20,col)+chair(tc.x+tc.w+2,tc.y+8,10,20,col);
          } else if(tc.shape==='vertical'){
            sofasSVG=sofaVertical(tc.x-SF-1,tc.y,SF,tc.h,col)+sofaVertical(tc.x+tc.w+1,tc.y,SF,tc.h,col);
          } else {
            sofasSVG=sofaHorizontal(tc.x,tc.y-SF-1,tc.w,SF,col)+sofaHorizontal(tc.x,tc.y+tc.h+1,tc.w,SF,col);
          }

          const shadow=tc.shape==='round'
            ?`<circle cx="${tc.x+tc.w/2+2}" cy="${tc.y+tc.h/2+3}" r="${tc.w/2}" fill="#000" opacity="0.25"/>`
            :`<rect x="${tc.x+3}" y="${tc.y+3}" width="${tc.w}" height="${tc.h}" rx="${tc.shape==='rounded'?8:5}" fill="#000" opacity="0.25"/>`;

          const tableShape=tc.shape==='round'
            ?`<circle cx="${tc.x+tc.w/2}" cy="${tc.y+tc.h/2}" r="${tc.w/2}" fill="#1e1e1e" stroke="${col}" stroke-width="2"/>`
            :tc.shape==='vertical'
            ?`<rect x="${tc.x}" y="${tc.y}" width="${tc.w}" height="${tc.h}" rx="5" fill="#1e1e1e" stroke="${col}" stroke-width="2"/>`
            :`<rect x="${tc.x}" y="${tc.y}" width="${tc.w}" height="${tc.h}" rx="${tc.shape==='rounded'?8:5}" fill="#1e1e1e" stroke="${col}" stroke-width="2"/>`;

          const cx=tc.x+tc.w/2, cy=tc.y+tc.h/2;
          let labelY=cy+(t.status==='free'?4:-3);
          if(tc.shape==='vertical') labelY=cy;
          const label=`<text x="${cx}" y="${labelY}" text-anchor="middle" font-size="13" font-weight="700" fill="${col}" font-family="-apple-system,sans-serif">${tc.id}</text>`;
          const sub=t.status==='occupied'
            ?`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="8" fill="${col}">${tot} ₽</text>`
            :t.status==='reserved'
            ?`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="7" fill="${col}">бронь</text>`:'';

          return `<g onclick="selTableClick(${tc.id})" style="cursor:pointer">${sofasSVG}${shadow}${tableShape}${label}${sub}</g>`;
        }).join('');

        const neonText = `
          <text x="182" y="195" text-anchor="middle" font-size="16" font-weight="900" fill="var(--gold)" font-family="Segoe UI, sans-serif" letter-spacing="3" transform="rotate(-90,182,195)" filter="url(#glow)">
            СУПЕРНОВА
          </text>
          <defs>
            <filter id="glow">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
              <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
              <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
        `;

        return `<div class="floor-container">
        <svg id="floor-svg" viewBox="0 0 ${W} ${H}">
          <rect x="1" y="1" width="${W-2}" height="${H-2}" rx="12" fill="#111" stroke="#2e2e2e" stroke-width="1.5"/>

          <text x="270" y="9.5" text-anchor="middle" font-size="7.5" fill="#666" letter-spacing="1">ВХОД</text>
          <line x1="175" y1="14" x2="175" y2="${H-30}" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="5,4"/>
          <rect x="60" y="${H-28}" width="244" height="22" rx="5" fill="#1e1e1e" stroke="#3a3a3a" stroke-width="1"/>
          <text x="182" y="${H-14}" text-anchor="middle" font-size="8.5" fill="#666" letter-spacing="2">БАР</text>
          ${shapes}
          ${neonText}
        </svg></div>`;
      }

      function renderBron(c) {
        if(bronTab==='new'){ renderNewBron(c); return; }

        let allReservations = [];
        for (const table of tables) {
          if (table.brons && table.brons.length > 0) {
            for (const bron of table.brons) {
              if (bron.status === 'active') {
                allReservations.push({
                  id: bron.id,
                  guest_name: bron.guest_name,
                  guest_phone: bron.guest_phone,
                  guests_count: bron.guests_count,
                  arrival_time: bron.arrival_time,
                  note: bron.note,
                  tableId: table.id
                });
              }
            }
          }
        }

        let filtered = allReservations;
        if (searchBron && searchBron.trim() !== '') {
          filtered = allReservations.filter(b =>
            b.guest_name?.toLowerCase().includes(searchBron.toLowerCase()) ||
            b.guest_phone?.includes(searchBron)
          );
        }

        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const lateCount = allReservations.filter(b => {
          if (!b.arrival_time) return false;
          const [h, m] = b.arrival_time.split(':').map(Number);
          return (h * 60 + m) < nowMin;

                <span style="color:var(--pink);font-size:13px;font-weight:600">${b.arrival_time || '--:--'}</span>
              </div>
              <div style="font-size:13px;color:var(--text-secondary);margin-bottom:6px">
                ${T('table')} №${b.tableId} · ${b.guests_count || 1} ${lang==='ru'?'чел.':'guests'}

              <div style="font-size:13px;color:var(--text-secondary)">
                ${b.guest_phone || ''}

          <label class="lbl">${T('phone')}</label>
          <input class="inp phone-inp" style="margin-bottom:20px;border-radius:40px" id="bron-phone" value="${bronForm.phone}" placeholder="+7 ___ ___ __ __" oninput="handlePhoneInput(this)"/>

          <div class="equal-row">
            <div class="equal-item"><label class="lbl">${T('date')}</label><input type="date" class="inp" id="bron-date" value="${today}" min="${today}" style="border-radius:40px;width:100%;box-sizing:border-box"/></div>
            <div class="equal-item"><label class="lbl">${T('time')}</label><input type="time" class="inp" id="bron-time" value="${bronForm.time}" min="12:00" max="23:59" style="border-radius:40px;width:100%;box-sizing:border-box"/></div>
          </div>

          <div class="equal-row">
            <div class="equal-item"><label class="lbl">${T('guests')}</label><input type="number" class="inp" id="bron-guests" value="${bronForm.guests}" min="1" style="border-radius:40px"/></div>
            <div class="equal-item"><div style="visibility:hidden">placeholder</div></div>
          </div>

          <label class="lbl">${T('note')}</label>
          <input class="inp" id="bron-note" value="${bronForm.note}" placeholder="${lang==='ru'?'День рождения, особые пожелания...':'Special requests...'}" style="border-radius:40px"/>
        </div>
        <button class="btn btn-pink" onclick="doSaveBronFromForm()" style="border-radius:40px">${T('save')} →</button>`;
      }

      function handlePhoneInput(input) {
        bronForm.phone = formatPhoneRussian(input);
      }

      // ===== ANALYTICS =====
      function renderAnalyticsTab(c) {
        if(!waiter?.is_admin){
          c.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text-secondary)">${lang==='ru'?'Только для администратора':'Admin only'}</div>`;
          return;
        }

        const today = new Date().toISOString().split('T')[0];
        if(!analyticsFrom) analyticsFrom = today;
        if(!analyticsTo) analyticsTo = today;

        const live = `
        <div class="card" style="margin-bottom:20px;border-radius:28px">
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;text-transform:uppercase;letter-spacing:1.5px">${T('liveStatus')}</div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            <div class="metric"><div class="metric-label" style="color:var(--gold)">${T('busy')}</div><div class="metric-val" style="color:var(--gold);font-size:22px">${tables.filter(t=>t.status==='occupied').length}</div></div>
            <div class="metric"><div class="metric-label" style="color:var(--green)">${T('freeCount')}</div><div class="metric-val" style="color:var(--green);font-size:22px">${tables.filter(t=>t.status==='free').length}</div></div>
            <div class="metric"><div class="metric-label" style="color:var(--pink)">${T('reserved2')}</div><div class="metric-val" style="color:var(--pink);font-size:22px">${tables.filter(t=>t.status==='reserved').length}</div></div>
          </div>
        </div>`;

        c.innerHTML = live + `
        <div class="card" style="border-radius:28px">
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;text-transform:uppercase;letter-spacing:1.5px">${T('period')}</div>
          <div class="toggle" style="margin-bottom:16px;flex-wrap:wrap">
            ${['today','week','month','year'].map(p=>`<button class="toggle-btn ${analyticsTab===p?'active':''}" onclick="setAnalyticsPreset('${p}')" style="border-radius:40px">${T(p)}</button>`).join('')}
          </div>
          <div class="date-range">
            <div class="date-item"><label class="lbl">${T('from')}</label><input type="date" class="inp" id="analytics-from" value="${analyticsFrom}" style="border-radius:40px;font-size:12px;width:100%;box-sizing:border-box"/></div>
            <div class="date-item"><label class="lbl">${T('to')}</label><input type="date" class="inp" id="analytics-to" value="${analyticsTo}" style="border-radius:40px;font-size:12px;width:100%;box-sizing:border-box"/></div>
          </div>
          <button class="btn btn-gold" onclick="doLoadAnalyticsFromDates()" style="border-radius:40px">${lang==='ru'?'Показать':'Show'}</button>
        </div>
        <div id="analytics-results"><div class="loader">${lang==='ru'?'Выберите период и нажмите Показать':'Select period and click Show'}</div></div>`;
      }

      async function loadAnalytics(from, to) {
        const {data:payments} = await sb.from('payments')
          .select('*, waiters(name)')
          .gte('paid_at', from+'T00:00:00')
          .lte('paid_at', to+'T23:59:59')
          .order('paid_at', {ascending:false});
        analyticsData = payments||[];
        renderAnalytics();
      }

      function renderAnalytics() {
        const el = $('analytics-results');
        if(!el) return;

        if(!analyticsData || analyticsData.length===0){
          el.innerHTML=`<div class="loader">${T('noAnalytics')}</div>`;
          return;
        }

        const total = analyticsData.reduce((s,p)=>s+p.total_final,0);
        const avgCheck = total / analyticsData.length;
        const cash  = analyticsData.filter(p=>p.payment_method==='cash').reduce((s,p)=>s+p.total_final,0);
        const card  = analyticsData.filter(p=>p.payment_method==='card').reduce((s,p)=>s+p.total_final,0);

        const byWaiter = {};
        analyticsData.forEach(p => {
          const name = p.waiters?.name || 'Unknown';
          byWaiter[name] = (byWaiter[name] || 0) + p.total_final;
        });

        el.innerHTML = `
        <div class="card" style="border-radius:28px">
          <div style="font-size:15px;font-weight:700;margin-bottom:14px;color:var(--gold)">📊 ${T('totalRevenue')}</div>
          <div style="font-size:32px;font-weight:800;color:var(--gold);margin-bottom:14px">${fmtRub(total)}</div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            <div class="metric"><div class="metric-label">${T('checksCount')}</div><div class="metric-val" style="font-size:20px">${analyticsData.length}</div></div>
            <div class="metric"><div class="metric-label">${T('avgCheck')}</div><div class="metric-val" style="font-size:20px">${fmtRub(avgCheck)}</div></div>
          </div>
        </div>

        <div class="card" style="border-radius:28px">
          <div style="font-size:15px;font-weight:700;margin-bottom:14px;color:var(--gold)">💰 ${T('salesByWaiter')}</div>
          <div style="overflow-x:auto">
            <table class="stats-table">
              <thead><tr><th>${lang==='ru'?'Официант':'Waiter'}</th><th>${T('revenue')}</th><th>${T('bonus')}</th></tr></thead>
              <tbody>
                ${Object.entries(byWaiter).map(([name,sales])=>`
                <tr><td style="font-weight:600">👤 ${name}</td><td style="color:var(--gold);font-weight:700">${fmtRub(sales)}</td><td style="color:var(--green)">${fmtRub(sales*0.025)}</td></tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card" style="border-radius:28px">
          <div style="font-size:15px;font-weight:700;margin-bottom:14px;color:var(--gold)">💳 ${lang==='ru'?'По способам оплаты':'By payment method'}</div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            <div class="metric"><div class="metric-label">💵 ${T('cash')}</div><div class="metric-val" style="font-size:18px">${fmtRub(cash)}</div></div>
            <div class="metric"><div class="metric-label">💳 ${T('card')}</div><div class="metric-val" style="font-size:18px">${fmtRub(card)}</div></div>
          </div>
        </div>

        <div style="margin-bottom:20px">
          <button class="btn btn-gold" onclick="exportToExcel()" style="border-radius:40px">📊 ${T('exportCSV')}</button>
        </div>

        <div class="card" style="border-radius:28px">
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;text-transform:uppercase;letter-spacing:1.5px">${lang==='ru'?'Последние платежи':'Recent payments'}</div>
          <div style="overflow-x:auto">
            ${analyticsData.slice(0,10).map(p=>`
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap">
              <div>
                <div style="font-weight:600">${T('table')} №${p.table_id} · ${p.waiters?.name||'?'}</div>
                <div style="color:var(--text-secondary);font-size:11px">${new Date(p.paid_at).toLocaleString()}</div>
              </div>
              <div style="text-align:right">
                <div style="color:var(--gold);font-weight:700">${p.total_final} ₽</div>
                <div style="color:var(--text-secondary);font-size:11px">${p.payment_method==='cash'?'💵':'💳'}${p.discount>0?' -'+p.discount+'%':''}</div>
              </div>
            </div>`).join('')}
          </div>
        </div>`;
      }

      // ===== ACTION HANDLERS =====
      function setTab(t){
        tab=t;
        selTable=null;
        addingTo=null;
        расчётTable=null;
        billTable=null;
        tableDetailId=null;
        if(t==='bron') bronTab='list';
        renderMain();
      }

      function setViewMode(m){
        viewMode=m;
        savePreferences();
        selTable=null;
        renderContent();
      }

      function selTableClick(id){ selTable = selTable===id ? null : id; renderContent(); }
      function startAddOrder(id){
        addingTo=id;
        menuSearchTemp = '';
        menuSearch = '';
        renderContent();
      }
      function setAddingTo(v){ addingTo=v; renderContent(); }
      function startRaschet(id){ расчётTable=id; selTable=null; renderContent(); }
      function setRaschet(v){ расчётTable=v; renderContent(); }
      function goBill(id){ billTable=id; расчётTable=null; payMethod=null; cashGiven=''; renderContent(); }
      function backToBill(){ расчётTable=billTable; billTable=null; renderContent(); }
      function setPayMethod(m){ payMethod=m; cashGiven=''; renderContent(); }
      function setCashGiven(v){ cashGiven=v; renderContent(); }
      function openTableDetail(id){ tableDetailId=id; tableDetailTab='info'; selTable=null; renderContent(); }
      function closeTableDetail(){ tableDetailId=null; renderContent(); }
      function setTableDetailTab(t){ tableDetailTab=t; renderContent(); }
      function setBronTab(t){ bronTab=t; renderContent(); }
      function setBronTableId(id){ bronTableId=id; renderContent(); }
      function startNewBron(id){
        bronTableId=id;
        bronForm={name:'', phone:'', guests:'2', date:'', time:'19:00', note:''};
        tab='bron';
        bronTab='new';
        renderMain();
      }
      function doLogout(){ waiter=null; screen='login'; if(subTables) sb.removeChannel(subTables); render(); }

      function setAnalyticsPreset(p){
        analyticsTab=p;
        const today=new Date();
        const fmt=d=>d.toISOString().split('T')[0];
        if(p==='today'){ analyticsFrom=analyticsTo=fmt(today); }
        else if(p==='week'){ const d=new Date(today); d.setDate(d.getDate()-7); analyticsFrom=fmt(d); analyticsTo=fmt(today); }
        else if(p==='month'){ const d=new Date(today); d.setMonth(d.getMonth()-1); analyticsFrom=fmt(d); analyticsTo=fmt(today); }
        else if(p==='year'){ const d=new Date(today); d.setFullYear(d.getFullYear()-1); analyticsFrom=fmt(d); analyticsTo=fmt(today); }
        renderContent();
        doLoadAnalytics(analyticsFrom, analyticsTo);
      }

      async function doLoadAnalyticsFromDates(){
        const from = document.getElementById('analytics-from')?.value;
        const to = document.getElementById('analytics-to')?.value;
        if(from) analyticsFrom = from;
        if(to) analyticsTo = to;
        await doLoadAnalytics(analyticsFrom, analyticsTo);
      }

      async function doLoadAnalytics(from, to){
        const el=$('analytics-results');
        if(el) el.innerHTML=`<div class="loader">${lang==='ru'?'Загрузка...':'Loading...'}</div>`;
        await loadAnalytics(from, to);
      }

      async function doAddOrder(id,ru,en,price,cat){
        await withLock(async () => {
          const item={id,ru,en,price,cat};
          const t=tables.find(t=>t.id===addingTo);
          const ex=t?.orders?.find(o=>o.item_id===id);
          if(ex){
            await sb.from('orders').update({qty:ex.qty+1}).eq('id',ex.id);
            await sb.from('tables').update({status:'occupied', waiter_id:waiter.id}).eq('id',addingTo);
            await loadTables();
            renderContent();
          } else {
            await dbAddOrder(addingTo,item,cat);
          }
        });
      }

      async function doSetDiscount(tableId,pct){
        await dbSetDiscount(tableId, pct===tables.find(t=>t.id===tableId)?.discount?0:pct);
        renderContent();
      }

      async function doConfirmPay(){
        if(_actionLock) return;
        if(!payMethod) return;
        const t=tables.find(t=>t.id===billTable);
        const raw=tableTotal(t,false), disc=tableTotal(t,true);
        const given=parseFloat(cashGiven)||0, chg=given-disc;
        if(payMethod==='cash' && given<disc) return;
        await withLock(async () => {
          const btn = document.querySelector('[onclick="doConfirmPay()"]');
          if(btn){ btn.disabled=true; btn.style.opacity='0.5'; }
          await dbConfirmPay(billTable,payMethod,raw,disc,t.discount,given,chg,null);
          toast(lang==='ru'?'✅ Стол закрыт':'✅ Table closed');
          billTable=null; payMethod=null; cashGiven=''; selTable=null; tab='tables';
          renderMain();
        });
      }

      async function doSaveBronFromForm(){
        if(_actionLock) return;
        const name = document.getElementById('bron-name')?.value;
        const phone = document.getElementById('bron-phone')?.value;
        const date = document.getElementById('bron-date')?.value;
        const time = document.getElementById('bron-time')?.value;
        const guests = document.getElementById('bron-guests')?.value;
        const note = document.getElementById('bron-note')?.value;

        if(!name){ toast(lang==='ru'?'⚠️ Введите имя гостя':'⚠️ Enter guest name'); return; }
        if(!bronTableId){ toast(lang==='ru'?'⚠️ Выберите стол':'⚠️ Select a table'); return; }
        if(!date){ toast(lang==='ru'?'⚠️ Выберите дату':'⚠️ Select date'); return; }
        if(!time){ toast(lang==='ru'?'⚠️ Выберите время':'⚠️ Select time'); return; }
        if(!isWorkingHours(time)){
          toast(lang==='ru'?'❌ Ресторан работает с 12:00 до 03:00':'❌ Restaurant works from 12:00 to 03:00');
          return;
        }

        // Désactiver le bouton visuellement
        const saveBtn = document.querySelector('[onclick="doSaveBronFromForm()"]');
        if(saveBtn){ saveBtn.disabled=true; saveBtn.style.opacity='0.5'; }

        await withLock(async () => {
          try {
            await dbSaveBron(bronTableId, {name, phone, date, time, guests, note});
            bronForm={name:'', phone:'', guests:'2', date:'', time:'19:00', note:''};
            bronTableId=null;
            bronTab='list';
            toast(lang==='ru'?'✅ Бронь сохранена':'✅ Booking saved');
            tab='bron';
            renderMain();
          } catch(e){
            if(saveBtn){ saveBtn.disabled=false; saveBtn.style.opacity='1'; }
            if (e.message && e.message.startsWith('Double booking')) {
              const existTime = e.message.split(':')[1] || '';
              toast(lang==='ru'
                ? ('❌ Стол №' + bronTableId + ' уже забронирован' + (existTime ? ' в ' + existTime : '') + ' на эту дату')
                : ('❌ Table #' + bronTableId + ' already booked' + (existTime ? ' at ' + existTime : '') + ' on this date'));
            } else {
              toast('❌ Error: '+e.message);
            }
          }
        });
      }

      async function doOpenTable(id){
        await dbOpenTable(id);
        toast(lang==='ru'?'✅ Стол открыт, можно принимать заказ':'✅ Table opened, you can take orders');
        tableDetailId=null;
        addingTo = id;
        renderContent();
      }

      async function doCancelBron(bronId,tableId){
        await dbCancelBron(bronId,tableId);
        toast(lang==='ru'?'Бронь отменена':'Booking cancelled');
        renderContent();
      }

      // ===== INITIALIZATION =====
      loadPreferences();
      render();

      // ===== PWA SERVICE WORKER =====
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Enregistré:', reg.scope))
            .catch(err => console.warn('[SW] Erreur:', err));
        });
      }

      // ===== PWA INSTALL PROMPT =====
      let deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        // Montrer un bouton d'installation discret si pas encore installé
        const installed = localStorage.getItem('supernova_pwa_installed');
        if (!installed) showInstallBanner();
      });

      window.addEventListener('appinstalled', () => {
        localStorage.setItem('supernova_pwa_installed', '1');
        const banner = document.getElementById('pwa-banner');
        if (banner) banner.remove();
      });

      function showInstallBanner() {
        const banner = document.createElement('div');
        banner.id = 'pwa-banner';
        banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(212,175,55,0.15);border:1px solid var(--gold);border-radius:40px;padding:10px 20px;display:flex;align-items:center;gap:12px;z-index:500;backdrop-filter:blur(20px);max-width:340px;width:90%';
        banner.innerHTML = `
          <span style="font-size:20px">📲</span>
          <span style="font-size:13px;color:var(--text);flex:1">Installer l'app sur votre écran d'accueil</span>
          <button onclick="installPWA()" style="background:var(--gold);color:#0A0A0A;border:none;border-radius:40px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer">Installer</button>
          <button onclick="this.closest('#pwa-banner').remove()" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;padding:0 4px">✕</button>
        `;
        document.body.appendChild(banner);
      }

      function installPWA() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
          if (choice.outcome === 'accepted') {
            localStorage.setItem('supernova_pwa_installed', '1');
          }
          deferredPrompt = null;
          const banner = document.getElementById('pwa-banner');
          if (banner) banner.remove();
        });
      }
    </script>
  </body>
</html>
