<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    background: #0E0E0E;
    color: #F5F0E8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  :root {
    --gold: #C9A84C;
    --dark: #0E0E0E;
    --surface: #1A1A1A;
    --surface2: #242424;
    --border: #2E2E2E;
    --text: #F5F0E8;
    --muted: #888;
    --green: #2ECC71;
    --red: #E74C3C;
    --pink: #C0395A;
    --shadow: 0 4px 12px rgba(0,0,0,0.3);
    --transition: all 0.2s ease;
  }
  
  input, button {
    font-family: inherit;
    outline: none;
  }
  
  button {
    cursor: pointer;
    transition: var(--transition);
  }
  
  button:active {
    transform: scale(0.97);
  }
  
  /* Header avec safe area */
  .hdr {
    background: rgba(26, 26, 26, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .logo-text {
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }
  
  .logo-sub {
    font-size: 9px;
    color: var(--muted);
  }
  
  .hdr-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  
  .waiter-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 8px;
    border-radius: 20px;
  }
  
  .lang-btn, .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    transition: var(--transition);
  }
  
  .lang-btn:active, .icon-btn:active {
    background: var(--surface2);
    transform: scale(0.95);
  }
  
  .icon-btn {
    color: var(--red);
  }
  
  /* Nav */
  .nav {
    display: flex;
    background: rgba(26, 26, 26, 0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  .nav-btn {
    flex: 1;
    padding: 10px 4px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    border-top: 2px solid transparent;
    transition: var(--transition);
  }
  
  .nav-btn.active {
    color: var(--gold);
    border-top-color: var(--gold);
  }
  
  .nav-btn .nav-icon {
    font-size: 20px;
    display: block;
    margin-bottom: 2px;
  }
  
  /* Content */
  .content {
    padding: 14px;
    padding-bottom: 80px;
  }
  
  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    transition: var(--transition);
    box-shadow: var(--shadow);
  }
  
  /* Buttons */
  .btn {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    width: 100%;
    display: block;
    text-align: center;
    margin-bottom: 8px;
    transition: var(--transition);
  }
  
  .btn:active {
    transform: scale(0.98);
  }
  
  .btn-gold {
    background: var(--gold);
    color: #000;
  }
  
  .btn-pink {
    background: var(--pink);
    color: #fff;
  }
  
  .btn-green {
    background: var(--green);
    color: #fff;
  }
  
  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
  }
  
  .btn-outline-red {
    background: none;
    border: 1px solid var(--red);
    color: var(--red);
  }
  
  .btn-outline-gold {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold);
    background: var(--surface2);
  }
  
  .btn-sm {
    padding: 8px 12px;
    font-size: 12px;
    border-radius: 10px;
    width: auto;
    flex: 1;
  }
  
  /* Inputs */
  .inp {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text);
    width: 100%;
    transition: var(--transition);
  }
  
  .inp:focus {
    border-color: var(--gold);
    outline: none;
  }
  
  .lbl {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  
  /* Toggle */
  .toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  
  .toggle-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
    font-weight: 500;
  }
  
  .toggle-btn.active {
    background: var(--gold);
    color: #000;
  }
  
  .toggle-btn:not(.active) {
    background: var(--surface2);
    color: var(--muted);
  }
  
  /* Status badge */
  .badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  
  .badge-occupied {
    background: #2A2000;
    color: var(--gold);
  }
  
  .badge-reserved {
    background: #2A0010;
    color: var(--pink);
  }
  
  .badge-free {
    background: #0A1A0A;
    color: var(--green);
  }
  
  /* Login */
  .login-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
    overflow: hidden;
  }
  
  .pin-dots {
    display: flex;
    gap: 14px;
    margin-bottom: 36px;
  }
  
  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border);
    transition: var(--transition);
  }
  
  .pin-dot.filled {
    background: var(--gold);
  }
  
  .pin-dot.error {
    background: var(--red);
  }
  
  .pin-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 260px;
  }
  
  .pin-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 50%;
    width: 72px;
    height: 72px;
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }
  
  .pin-btn:active {
    background: rgba(255,255,255,0.16);
    transform: scale(0.95);
  }
  
  .pin-btn.del {
    background: none;
    font-size: 22px;
    color: var(--muted);
  }
  
  /* Floor plan */
  #floor-svg {
    width: 100%;
    max-width: 360px;
    display: block;
    margin: 0 auto;
  }
  
  .floor-container {
    background: linear-gradient(160deg, #181818, #111);
    border-radius: 20px;
    padding: 12px;
    border: 1px solid #2E2E2E;
    box-shadow: var(--shadow);
  }
  
  /* Metric */
  .metric {
    background: var(--surface2);
    border-radius: 14px;
    padding: 14px;
    flex: 1;
    text-align: center;
    transition: var(--transition);
  }
  
  .metric-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .metric-val {
    font-size: 24px;
    font-weight: 700;
  }
  
  /* Search */
  .search-wrap {
    position: relative;
    flex: 1;
  }
  
  .search-wrap .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--muted);
  }
  
  .search-wrap .inp {
    padding-left: 42px;
  }
  
  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);

    backdrop-filter: blur(10px);
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  
  .toast.show {
    opacity: 1;
  }
  
  /* Loader */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;

    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);

    border-color: var(--gold);
    background: #1A1500;
    color: var(--gold);
  }
  
  .disc-btn:active {
    transform: scale(0.95);
  }
  
  /* Receipt */

    background: #fff;
    color: #000;
    border-radius: 16px;
    padding: 20px;
    font-family: monospace;
    max-width: 320px;
    margin: 0 auto 18px;
    box-shadow: var(--shadow);

  .receipt-title {
    font-size: 18px;
    font-weight: 700;
    text-align: center;
  }
  
  .receipt-sub {
    font-size: 10px;
    color: #555;
    letter-spacing: 2px;
    text-align: center;
  }
  
  .receipt-divider {
    border-top: 1px dashed #ccc;
    margin: 10px 0;
  }
  
  .receipt-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 3px;
  }
  
  .receipt-total {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 16px;
    margin-top: 4px;

    padding: 14px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    font-weight: 600;
  }
  
  .pay-btn.active {
    border-color: var(--gold);
    background: #1A1500;
    color: var(--gold);
  }
  
  .pay-btn:active {
    transform: scale(0.97);
  }
  
  /* Change display */
  .change-box {
    display: flex;
    justify-content: space-between;
    background: #0A1A0A;
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 8px;
  }
  
  /* Scrollable cats */
  .cat-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 12px;
    scrollbar-width: none;
  }

  }
  
  .cat-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 30px;
    border: none;
    font-size: 12px;
    cursor: pointer;
    transition: var(--transition);
    font-weight: 500;
  }
  
  .cat-btn.active {
    background: var(--gold);
    color: #000;
  }
  
  .cat-btn:not(.active) {
    background: var(--surface2);
    color: var(--muted);
  }
  
  .cat-btn:active {
    transform: scale(0.95);

    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 12px;
  }
  
  .bron-counter {
    flex: 1;
    text-align: center;
  }
  
  .bron-counter-label {
    font-size: 11px;
    color: var(--muted);
  }
  
  .bron-counter-val {
    font-size: 20px;
    font-weight: 700;
  }
  
  /* Analytics */
  .date-range {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  
  .date-item {
    flex: 1;
    min-width: 0;
  }
  
  .date-item .inp {
    font-size: 13px;
    padding: 10px 12px;
  }
  
  /* Table buttons grid */
  .table-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }
  
  .table-btn {
    padding: 10px 16px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  
  .table-btn.active {
    border-color: var(--pink);
    background: #2A0010;
    color: var(--pink);
  }
  
  .table-btn:active {
    transform: scale(0.95);
  }
  
  /* Time row */
  .time-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  
  .time-item {
    flex: 1;
  }
  
  /* RestoFlow branding */
  .restoflow {
    position: fixed;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    pointer-events: none;
  }
  
  .restoflow span {
    color: #C9A84C;
    font-weight: 500;
  }
  
  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .card, .floor-container {
    animation: fadeIn 0.3s ease;
  }
</style>
</head>

function formatPhoneRussian(input) {
  let v = input.value.replace(/\D/g, '');
  if (v.startsWith('8')) v = '7' + v.slice(1);
  if (!v.startsWith('7')) v = '7' + v;
  v = v.slice(0, 11);
  let f = '+7';
  if (v.length > 1) f += ' ' + v.slice(1, 4);
  if (v.length > 4) f += ' ' + v.slice(4, 7);
  if (v.length > 7) f += ' ' + v.slice(7, 9);
  if (v.length > 9) f += ' ' + v.slice(9, 11);
  input.value = f;
  return f;
}

const toast = (msg, dur=2500) => {
  const el = $('toast');

const tableTotal = (t, withDisc=false) => {
  if(!t || !t.orders) return 0;
  const raw = (t.orders||[]).reduce((s,o)=>s+o.price*o.qty,0);
  if(!withDisc||!t.discount) return raw;
  const disc = (t.orders||[]).filter(o=>!NO_DISC.includes(o.category)).reduce((s,o)=>s+o.price*o.qty,0);
  return Math.round((raw-disc)+disc*(1-t.discount/100));
};

// Supabase
async function loadTables() {
  const {data} = await sb.from('tables').select('*, orders(*)').order('id');
  if(data) {
    const {data:brons} = await sb.from('brons').select('*').eq('status','active');
    tables = data.map(t => ({
      ...t,
      orders: t.orders||[],
      brons: (brons||[]).filter(b=>b.table_id===t.id)
    }));
    render();
  }
}

function subscribeRealtime() {
  subTables = sb.channel('tables-channel')
    .on('postgres_changes',{event:'*',schema:'public'},()=>{ loadTables(); })
    .subscribe();
}

// Login
async function tryLogin(p) {
  const {data:ws} = await sb.from('waiters').select('*').eq('pin',p).eq('is_active',true);
  if(!ws||ws.length===0) return false;
  waiter = ws[0];
  return true;
}

// DB Actions
async function dbAddOrder(tableId, item, cat) {
  await sb.from('orders').insert({
    table_id:tableId, waiter_id:waiter.id,
    item_id:item.id, item_name_ru:item.ru, item_name_en:item.en,
    category:cat, price:item.price, qty:1
  });
  await sb.from('tables').update({status:'occupied', waiter_id:waiter.id}).eq('id',tableId);
  await loadTables();
}

async function dbRemoveOrder(orderId, tableId) {
  await sb.from('orders').delete().eq('id',orderId);
  const t = tables.find(t=>t.id===tableId);
  const remaining = (t.orders||[]).filter(o=>o.id!==orderId);
  if(remaining.length===0){
    await sb.from('tables').update({status:'free', waiter_id:null, discount:0}).eq('id',tableId);
  }
  await loadTables();
}

async function dbSetDiscount(tableId, pct) {
  await sb.from('tables').update({discount:pct}).eq('id',tableId);
  await loadTables();
}

async function dbConfirmPay(tableId, method, raw, final, disc, given, chg) {
  const t = tables.find(t=>t.id===tableId);
  await sb.from('payments').insert({
    table_id:tableId, waiter_id:t.waiter_id||waiter.id,
    total_raw:raw, total_final:final, discount:disc,
    payment_method:method,
    cash_given:method==='cash'?given:null,
    change_given:method==='cash'?chg:null
  });
  await sb.from('orders').delete().eq('table_id',tableId);
  await sb.from('tables').update({status:'free', waiter_id:null, discount:0}).eq('id',tableId);
  await loadTables();
}

async function dbSaveBron(tableId, form) {
  await sb.from('brons').insert({
    table_id:tableId, guest_name:form.name, guest_phone:form.phone,
    guests_count:parseInt(form.guests)||1, arrival_time:form.time,
    note:form.note, status:'active'
  });
  await sb.from('tables').update({status:'reserved'}).eq('id',tableId);
  await loadTables();
}

async function dbOpenTable(tableId) {
  await sb.from('brons').update({status:'opened'}).eq('table_id',tableId).eq('status','active');
  await sb.from('tables').update({status:'occupied', waiter_id:waiter.id}).eq('id',tableId);
  await loadTables();
}

async function dbCancelBron(bronId, tableId) {
  await sb.from('brons').update({status:'cancelled'}).eq('id',bronId);
  const t = tables.find(t=>t.id===tableId);
  const remaining = (t.brons||[]).filter(b=>b.id!==bronId);
  if(remaining.length===0){
    await sb.from('tables').update({status:'free'}).eq('id',tableId);
  }
  await loadTables();
}

async function loadAnalytics(from, to) {
  const {data:payments} = await sb.from('payments')
    .select('*, waiters(name)')
    .gte('paid_at', from+'T00:00:00')
    .lte('paid_at', to+'T23:59:59')
    .order('paid_at', {ascending:false});
  analyticsData = payments||[];
  renderAnalytics();
}

function exportCSV() {
  if(!analyticsData || analyticsData.length===0) {
    toast(lang==='ru'?'Нет данных для экспорта':'No data to export');
    return;
  }
  const rows = [['Date','Table','Waiter','Total','Discount','Method']];
  analyticsData.forEach(p => {
    rows.push([
      new Date(p.paid_at).toLocaleString(),
      p.table_id, p.waiters?.name||'',
      p.total_final, p.discount+'%', p.payment_method
    ]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'supernova_analytics.csv';
  a.click();
}

let _pinVal = '';
function pinPress(d) {
  if(d==='del'){ _pinVal=_pinVal.slice(0,-1); updateDots(); return; }
  _pinVal += d; updateDots();
  if(_pinVal.length===4) doLogin();
}

function updateDots(err=false) {
  for(let i=0;i<4;i++){
    const dot=$('dot'+i);
    if(!dot) return;
    dot.classList.toggle('filled',i<_pinVal.length && !err);
    dot.classList.toggle('error',i<_pinVal.length && err);
  }
}

async function doLogin() {
  const ok = await tryLogin(_pinVal);
  if(ok){ 
    screen='main'; 
    document.body.style.overflow = 'auto'; 
    await loadTables(); 
    subscribeRealtime(); 
  } else { 
    updateDots(true); 
    setTimeout(()=>{ _pinVal=''; updateDots(); },700); 
  }
}

function renderFloorPlan() {
  const W=364, H=380;
  
  const sofaVertical=(x,y,w,h,col)=>{
    const ch=Math.floor(h/3);
    const cushions=[1,2].map(i=>`<line x1="${x+2}" y1="${y+ch*i}" x2="${x+w-2}" y2="${y+ch*i}" stroke="${col}" stroke-width="1" opacity="0.5"/>`).join('');
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="0.15" stroke="${col}" stroke-width="0.8" stroke-opacity="0.5"/>${cushions}`;
  };
  const sofaHorizontal=(x,y,w,h,col)=>{
    const cw=Math.floor(w/3);
    const cushions=[1,2].map(i=>`<line x1="${x+cw*i}" y1="${y+2}" x2="${x+cw*i}" y2="${y+h-2}" stroke="${col}" stroke-width="1" opacity="0.5"/>`).join('');
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="0.15" stroke="${col}" stroke-width="0.8" stroke-opacity="0.5"/>${cushions}`;
  };
  const chair=(x,y,w,h,col)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${col}" fill-opacity="0.18" stroke="${col}" stroke-width="0.8" stroke-opacity="0.6"/>`;

  const TW=78, TH=30, SF=8;
  const lx=18, rx=210;

  const tcs=[
    {id:7, x:lx+20, y:32,  w:36, h:70, shape:'vertical'},
    {id:6, x:lx+18, y:130, w:36, h:36, shape:'round'},
    {id:5, x:lx, y:200, w:TW, h:TH, shape:'rect'},
    {id:4, x:lx, y:270, w:TW, h:TH, shape:'rect'},
    {id:1, x:rx, y:60,  w:TW+22, h:TH, shape:'rect'},
    {id:2, x:rx, y:150, w:TW+22, h:TH, shape:'rect'},
    {id:3, x:rx, y:240, w:TW+22, h:TH, shape:'rounded'},
  ];

  const shapes=tcs.map(tc=>{
    const t=tables.find(t=>t.id===tc.id)||{status:'free',orders:[],discount:0};
    const col=statusColor(t.status);
    const tot=t.status==='occupied'?tableTotal(t,true):0;

    let sofasSVG='';
    if(tc.shape==='round'){
      sofasSVG=chair(tc.x-12,tc.y+8,10,20,col)+chair(tc.x+tc.w+2,tc.y+8,10,20,col);
    } else if(tc.shape==='vertical'){
      sofasSVG=sofaVertical(tc.x-SF-1,tc.y,SF,tc.h,col)+sofaVertical(tc.x+tc.w+1,tc.y,SF,tc.h,col);
    } else {
      sofasSVG=sofaHorizontal(tc.x,tc.y-SF-1,tc.w,SF,col)+sofaHorizontal(tc.x,tc.y+tc.h+1,tc.w,SF,col);
    }

    const shadow=tc.shape==='round'
      ?`<circle cx="${tc.x+tc.w/2+2}" cy="${tc.y+tc.h/2+3}" r="${tc.w/2}" fill="#000" opacity="0.25"/>`
      :`<rect x="${tc.x+3}" y="${tc.y+3}" width="${tc.w}" height="${tc.h}" rx="${tc.shape==='rounded'?8:5}" fill="#000" opacity="0.25"/>`;

    const tableShape=tc.shape==='round'
      ?`<circle cx="${tc.x+tc.w/2}" cy="${tc.y+tc.h/2}" r="${tc.w/2}" fill="#1e1e1e" stroke="${col}" stroke-width="2"/>`
      :tc.shape==='vertical'
      ?`<rect x="${tc.x}" y="${tc.y}" width="${tc.w}" height="${tc.h}" rx="5" fill="#1e1e1e" stroke="${col}" stroke-width="2"/>`
      :`<rect x="${tc.x}" y="${tc.y}" width="${tc.w}" height="${tc.h}" rx="${tc.shape==='rounded'?8:5}" fill="#1e1e1e" stroke="${col}" stroke-width="2"/>`;

    const cx=tc.x+tc.w/2, cy=tc.y+tc.h/2;
    let labelY=cy+(t.status==='free'?4:-3);
    if(tc.shape==='vertical') labelY=cy;
    const label=`<text x="${cx}" y="${labelY}" text-anchor="middle" font-size="13" font-weight="700" fill="${col}" font-family="-apple-system,sans-serif">${tc.id}</text>`;
    const sub=t.status==='occupied'
      ?`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="8" fill="${col}">${tot} ₽</text>`
      :t.status==='reserved'
      ?`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="7" fill="${col}">бронь</text>`:'';

    return `<g onclick="selTableClick(${tc.id})" style="cursor:pointer">${sofasSVG}${shadow}${tableShape}${label}${sub}</g>`;
  }).join('');

  return `<div class="floor-container" style="overflow:hidden">
  <svg id="floor-svg" viewBox="0 0 ${W} ${H}" style="display:block;width:100%;height:auto">
    <rect x="1" y="1" width="${W-2}" height="${H-2}" rx="12" fill="#111" stroke="#2e2e2e" stroke-width="1.5"/>
    <rect x="230" y="1" width="80" height="11" rx="3" fill="#242424"/>
    <text x="270" y="9.5" text-anchor="middle" font-size="7.5" fill="#666" letter-spacing="1">ВХОД</text>
    <line x1="175" y1="14" x2="175" y2="${H-30}" stroke="#2e2e2e" stroke-width="1" stroke-dasharray="5,4"/>
    <rect x="60" y="${H-28}" width="244" height="22" rx="5" fill="#1e1e1e" stroke="#3a3a3a" stroke-width="1"/>
    <text x="182" y="${H-14}" text-anchor="middle" font-size="8.5" fill="#666" letter-spacing="2">БАР</text>
    ${shapes}
  </svg></div>`;
}

// Bron
function renderBron(c) {
  if(bronTab==='new'){ renderNewBron(c); return; }
  
  // Filter active brons only (not opened/cancelled)
  const brons = tables.flatMap(t=>(t.brons||[]).filter(b=>b.status==='active').map(b=>({...b, tableId:t.id})))
    .filter(b=>!searchBron || b.guest_name?.toLowerCase().includes(searchBron.toLowerCase()) || b.guest_phone?.includes(searchBron));
  
  const now = new Date(); 
  const nowMin = now.getHours()*60 + now.getMinutes();
  const lateCount = brons.filter(b => {
    const [h,m] = (b.arrival_time||'0:0').split(':');
    return (parseInt(h)*60 + parseInt(m)) < nowMin;
  }).length;

  c.innerHTML = `
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <div class="search-wrap"><span class="search-icon">🔍</span><input class="inp" placeholder="${lang==='ru'?'Имя или телефон':'Name or phone'}" value="${searchBron}" oninput="handleBronSearch(this.value)" inputmode="search"/></div>
    <button class="btn btn-pink" style="width:auto;padding:0 18px;white-space:nowrap;margin-bottom:0" onclick="setBronTab('new')">+ ${T('bron')}</button>
  </div>
  ${!brons.length?`<div style="text-align:center;color:var(--muted);padding:40px">${T('noBookings')}</div>`
  :brons.map(b=>`
  <div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-weight:600">${b.guest_name}</span><span style="color:var(--pink);font-size:13px;font-weight:500">${b.arrival_time}</span>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:4px">${T('table')} №${b.tableId} · ${b.guests_count} ${lang==='ru'?'чел.':'guests'}</div>
    <div style="font-size:13px;color:var(--muted)">${b.guest_phone||''}</div>
    ${b.note?`<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic">${b.note}</div>`:''}
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-green btn-sm" onclick="doOpenTable(${b.tableId})">${T('open')}</button>
      <button class="btn btn-outline-red btn-sm" onclick="doCancelBron('${b.id}',${b.tableId})">✕ ${T('cancelBron')}</button>
    </div>
  </div>`).join('')}
  <div class="bron-counters">
    <div class="bron-counter"><div class="bron-counter-label" style="color:var(--gold)">${T('late')}</div><div class="bron-counter-val" style="color:var(--gold)">${lateCount}</div></div>
    <div class="bron-counter"><div class="bron-counter-label" style="color:var(--green)">${T('openCount')}</div><div class="bron-counter-val" style="color:var(--green)">${tables.filter(t=>t.status==='occupied').length}</div></div>

  </div>`;
}

    <div class="date-range">
      <div class="date-item"><label class="lbl">${T('from')}</label><input type="date" class="inp" id="analytics-from" value="${analyticsFrom}"/></div>
      <div class="date-item"><label class="lbl">${T('to')}</label><input type="date" class="inp" id="analytics-to" value="${analyticsTo}"/></div>
    </div>
    <button class="btn btn-gold" onclick="doLoadAnalyticsFromDates()">${lang==='ru'?'Показать':'Show'}</button>
  </div>
  <div id="analytics-results"><div class="loader">${lang==='ru'?'Выберите период и нажмите Показать':'Select period and click Show'}</div></div>`;
}

function renderAnalytics() {
  const el = $('analytics-results'); 
  if(!el) return;
  
  if(!analyticsData || analyticsData.length===0){ 
    el.innerHTML=`<div class="loader">${T('noAnalytics')}</div>`; 
    return; 
  }

  const total = analyticsData.reduce((s,p)=>s+p.total_final,0);
  const cash  = analyticsData.filter(p=>p.payment_method==='cash').reduce((s,p)=>s+p.total_final,0);
  const card  = analyticsData.filter(p=>p.payment_method==='card').reduce((s,p)=>s+p.total_final,0);
  
  const byWaiter = {};
  analyticsData.forEach(p => {
    const name = p.waiters?.name || 'Unknown';
    byWaiter[name] = (byWaiter[name] || 0) + p.total_final;
  });

  el.innerHTML = `
  <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
    <div class="metric"><div class="metric-label">${T('revenue')}</div><div class="metric-val" style="font-size:20px;color:var(--gold)">${fmtRub(total)}</div></div>
    <div class="metric"><div class="metric-label">${T('orders')}</div><div class="metric-val" style="font-size:20px">${analyticsData.length}</div></div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div class="metric"><div class="metric-label">💵 ${T('cash')}</div><div class="metric-val" style="font-size:16px">${fmtRub(cash)}</div></div>
    <div class="metric"><div class="metric-label">💳 ${T('card')}</div><div class="metric-val" style="font-size:16px">${fmtRub(card)}</div></div>
  </div>
  <div class="card">
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">${T('salesByWaiter')}</div>
    ${Object.entries(byWaiter).map(([name,sales])=>`
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-size:14px;font-weight:500">👤 ${name}</div><div style="font-size:12px;color:var(--muted)">${fmtRub(sales)}</div></div>
      <div style="text-align:right"><div style="font-size:14px;font-weight:600;color:var(--green)">${fmtRub(sales*0.025)}</div><div style="font-size:11px;color:var(--muted)">2,5%</div></div>
    </div>`).join('')}
  </div>
  <div style="margin-bottom:16px">
    <button class="btn btn-outline-gold btn-sm" onclick="exportCSV()" style="width:100%">↓ CSV</button>
  </div>
  <div class="card">
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">${lang==='ru'?'Последние платежи':'Recent payments'}</div>
    ${analyticsData.slice(0,10).map(p=>`
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
      <div>
        <div style="font-weight:500">${T('table')} №${p.table_id} · ${p.waiters?.name||'?'}</div>
        <div style="color:var(--muted)">${new Date(p.paid_at).toLocaleString()}</div>
      </div>
      <div style="text-align:right">
        <div style="color:var(--gold);font-weight:600">${p.total_final} ₽</div>
        <div style="color:var(--muted)">${p.payment_method==='cash'?'💵':'💳'}${p.discount>0?' -'+p.discount+'%':''}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// Action handlers
function setTab(t){ tab=t; selTable=null; addingTo=null; расчётTable=null; billTable=null; tableDetailId=null; if(t==='bron') bronTab='list'; renderMain(); }
function setViewMode(m){ viewMode=m; selTable=null; renderContent(); }
function selTableClick(id){ selTable = selTable===id ? null : id; renderContent(); }
function startAddOrder(id){ addingTo=id; menuSearch=''; renderContent(); }
function setAddingTo(v){ addingTo=v; renderContent(); }
function setMenuCat(v){ menuCat=v; renderContent(); }
function startRaschet(id){ расчётTable=id; selTable=null; renderContent(); }
function setRaschet(v){ расчётTable=v; renderContent(); }
function goBill(id){ billTable=id; расчётTable=null; payMethod=null; cashGiven=''; renderContent(); }
function backToBill(){ расчётTable=billTable; billTable=null; renderContent(); }
function setPayMethod(m){ payMethod=m; cashGiven=''; renderContent(); }
function setCashGiven(v){ cashGiven=v; renderContent(); }
function openTableDetail(id){ tableDetailId=id; tableDetailTab='info'; selTable=null; renderContent(); }
function closeTableDetail(){ tableDetailId=null; renderContent(); }
function setTableDetailTab(t){ tableDetailTab=t; renderContent(); }
function setBronTab(t){ bronTab=t; renderContent(); }
function setBronTableId(id){ bronTableId=id; renderContent(); }
function startNewBron(id){ bronTableId=id; bronForm={name:'', phone:'', guests:'2', time:'19:00', note:''}; tab='bron'; bronTab='new'; renderMain(); }
function doLogout(){ waiter=null; screen='login'; if(subTables) sb.removeChannel(subTables); render(); }

function setAnalyticsPreset(p){
  analyticsTab=p;
  const today=new Date();
  const fmt=d=>d.toISOString().split('T')[0];
  if(p==='today'){ analyticsFrom=analyticsTo=fmt(today); }
  else if(p==='week'){ const d=new Date(today); d.setDate(d.getDate()-7); analyticsFrom=fmt(d); analyticsTo=fmt(today); }
  else if(p==='month'){ const d=new Date(today); d.setMonth(d.getMonth()-1); analyticsFrom=fmt(d); analyticsTo=fmt(today); }
  else if(p==='year'){ const d=new Date(today); d.setFullYear(d.getFullYear()-1); analyticsFrom=fmt(d); analyticsTo=fmt(today); }
  renderContent();
  doLoadAnalytics(analyticsFrom, analyticsTo);
}

async function doLoadAnalyticsFromDates(){
  const from = document.getElementById('analytics-from')?.value;
  const to = document.getElementById('analytics-to')?.value;
  if(from) analyticsFrom = from;
  if(to) analyticsTo = to;
  await doLoadAnalytics(analyticsFrom, analyticsTo);
}

async function doLoadAnalytics(from, to){
  const el=$('analytics-results');
  if(el) el.innerHTML=`<div class="loader">${lang==='ru'?'Загрузка...':'Loading...'}</div>`;
  await loadAnalytics(from, to);
}

async function doAddOrder(id,ru,en,price,cat){
  const item={id,ru,en,price,cat};
  const t=tables.find(t=>t.id===addingTo);
  const ex=t?.orders?.find(o=>o.item_id===id);
  if(ex){ 
    await sb.from('orders').update({qty:ex.qty+1}).eq('id',ex.id); 
    await sb.from('tables').update({status:'occupied', waiter_id:waiter.id}).eq('id',addingTo); 
  } else { 
    await dbAddOrder(addingTo,item,cat); 
  }
  await loadTables(); 
  renderContent();
}

async function doRemoveOrder(orderId,tableId){
  await dbRemoveOrder(orderId,tableId); 
  renderContent();
}

async function doSetDiscount(tableId,pct){
  await dbSetDiscount(tableId, pct===tables.find(t=>t.id===tableId)?.discount?0:pct); 
  renderContent();
}

async function doConfirmPay(){
  if(!payMethod) return;
  const t=tables.find(t=>t.id===billTable);
  const raw=tableTotal(t,false), disc=tableTotal(t,true);
  const given=parseFloat(cashGiven)||0, chg=given-disc;
  if(payMethod==='cash' && given<disc) return;
  await dbConfirmPay(billTable,payMethod,raw,disc,t.discount,given,chg);
  toast(lang==='ru'?'✅ Стол закрыт':'✅ Table closed');
  billTable=null; payMethod=null; cashGiven=''; selTable=null; tab='tables';
  renderMain();
}

async function doSaveBronFromForm(){
  const name = document.getElementById('bron-name')?.value;
  const phone = document.getElementById('bron-phone')?.value;
  const guests = document.getElementById('bron-guests')?.value;
  const time = document.getElementById('bron-time')?.value;
  const note = document.getElementById('bron-note')?.value;
  
  if(!name){ toast(lang==='ru'?'⚠️ Введите имя гостя':'⚠️ Enter guest name'); return; }
  if(!bronTableId){ toast(lang==='ru'?'⚠️ Выберите стол':'⚠️ Select a table'); return; }
  
  try {
    await dbSaveBron(bronTableId, {name, phone, guests, time, note});
    bronForm={name:'', phone:'', guests:'2', time:'19:00', note:''};
    bronTableId=null; 
    bronTab='list';
    toast(lang==='ru'?'✅ Бронь сохранена':'✅ Booking saved');
    tab='bron'; 
    renderMain();
  } catch(e){
    toast('❌ Error: '+e.message);
  }
}

async function doOpenTable(id){
  await dbOpenTable(id);
  toast(lang==='ru'?'✅ Стол открыт, можно принимать заказ':'✅ Table opened, you can take orders');
  tableDetailId=null;
  // Auto redirect to add order
  addingTo = id;
  renderContent();
}

async function doCancelBron(bronId,tableId){
  await dbCancelBron(bronId,tableId);
  toast(lang==='ru'?'Бронь отменена':'Booking cancelled');
  renderContent();
}

// Initialize
render();
</script>
</body>
</html>
